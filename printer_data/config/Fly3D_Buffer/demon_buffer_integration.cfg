#####################################################################
# FLY-LLL PLUS Buffer — Demon Klipper Essentials Integration Snippet
#####################################################################
#
# !! THIS FILE IS A REFERENCE SNIPPET — DO NOT INCLUDE IT DIRECTLY !!
#
# Klipper will error with "duplicate macro" if you include this file
# alongside demon_custom_expansion.cfg (both define the same macros).
#
# Instead, copy the relevant sections below into YOUR printer's
# demon_custom_expansion.cfg file, which lives at:
#   ~/printer_data/config/demon_custom_expansion.cfg
#
# What this does:
#   LOAD_FILAMENT  → pre-load hook checks filament sensor before
#                    Demon's extruder engagement runs. Aborts with a
#                    clear message if filament hasn't arrived yet.
#   UNLOAD_FILAMENT → post-unload hook runs buffer retraction after
#                    Demon's hotend retraction clears the extruder,
#                    pulling the filament tail fully out of the buffer.
#
# Prerequisites:
#   mellow_buffer_klipper.cfg and mellow_buffer_macros.cfg must be
#   included in printer.cfg BEFORE demon_custom_expansion.cfg.
#
# How Demon hooks work:
#   Each hook macro has a matching enable flag in
#   _CUSTOM_EXPANSION_ACTIVE_LIST. Both the master enable AND the
#   per-hook flag must be True for the hook to run.
#
#####################################################################


#####################################################################
# STEP 1 — Enable hooks in _CUSTOM_EXPANSION_ACTIVE_LIST
#####################################################################
# In your demon_custom_expansion.cfg, find _CUSTOM_EXPANSION_ACTIVE_LIST
# and change these four lines from False to True:
#
#   variable_pre_load:          True   # was False
#   variable_post_unload:       True   # was False
#   variable_pre_load_clean:    True   # was False
#   variable_post_unload_clean: True   # was False
#
# Also confirm the master switch is on (it usually is by default):
#   variable_ceal_master_enable: True
#####################################################################


#####################################################################
# STEP 2 — Fill in the hook macro bodies
#####################################################################
# Copy each macro body below into the matching empty macro stub in
# your demon_custom_expansion.cfg.
#####################################################################


# --- Pre-load hook (LOAD_FILAMENT) ----------------------------------
# Runs BEFORE Demon heats the hotend and engages the extruder.
# Checks that the buffer has already auto-fed filament to the extruder.
# If not ready, aborts with instructions — user inserts filament,
# waits for buffer to auto-feed (HALL sensor triggers firmware), then
# retries LOAD_FILAMENT.

[gcode_macro _CUSTOM_PRE_LOAD]
gcode:
    Buffer_Assert_Filament_Detected


# --- Post-unload hook (UNLOAD_FILAMENT) -----------------------------
# Runs AFTER Demon retracts filament ~32mm net from the hotend.
#
# WHY SYNCHRONIZED RETRACTION IS NEEDED:
# Demon's extruder pulls filament back toward the buffer during its
# retraction sequence. If the buffer motor isn't running at the same
# time, that filament piles up loosely in the PTFE tube with no
# tension — the buffer motor alone cannot grip and move slack filament.
#
# FIX: Start the buffer motor FIRST, then retract the full hotend
# path length with the extruder simultaneously. This keeps tension on
# the filament so the buffer can pull it through. Once the extruder
# releases its grip, Buffer_Retract_Until_Runout clears the tail.
#
# hotend_path_length (default 100mm) is read from _BUFFER_USER_SETTINGS.
# Adjust variable_hotend_path_length in mellow_buffer_user_settings.cfg
# to match the distance from your nozzle tip to your extruder entrance.

[gcode_macro _CUSTOM_POST_UNLOAD]
gcode:
    {% set buffer_vars = printer["gcode_macro _BUFFER_USER_SETTINGS"] %}
    {% set hotend_path_length = buffer_vars.hotend_path_length|float %}
    {% set speed = (buffer_vars.unload_speed|float * 60)|int %}

    SAVE_GCODE_STATE NAME=buffer_post_unload_state

    RESPOND MSG="Buffer: Starting synchronized retraction (buffer motor + extruder)..."
    SET_PIN PIN=_Feed_Button VALUE=1      # ensure feed pin released
    SET_PIN PIN=_Retract_Button VALUE=0   # start buffer motor retracting

    # Retract full hotend path while buffer motor runs simultaneously.
    # This keeps filament tensioned so the buffer can grip and pull it.
    M83
    G92 E0
    G1 E-{hotend_path_length} F{speed}
    M400

    RESPOND MSG="Buffer: Extruder cleared - buffer continuing until filament ejected..."
    Buffer_Retract_Until_Runout TIMEOUT=60 POLL=0.5

    RESTORE_GCODE_STATE NAME=buffer_post_unload_state


# --- Pre-load-clean hook (LOAD_CLEAN) --------------------------------
# LOAD_CLEAN = LOAD_FILAMENT + nozzle cleaning. Same pre-load check
# applies: filament must be at the extruder before Demon engages.

[gcode_macro _CUSTOM_PRE_LOAD_CLEAN]
gcode:
    Buffer_Assert_Filament_Detected


# --- Post-unload-clean hook (UNLOAD_CLEAN) ---------------------------
# UNLOAD_CLEAN = nozzle clean + UNLOAD_FILAMENT. Same synchronized
# retraction logic applies — see _CUSTOM_POST_UNLOAD comment above.

[gcode_macro _CUSTOM_POST_UNLOAD_CLEAN]
gcode:
    {% set buffer_vars = printer["gcode_macro _BUFFER_USER_SETTINGS"] %}
    {% set hotend_path_length = buffer_vars.hotend_path_length|float %}
    {% set speed = (buffer_vars.unload_speed|float * 60)|int %}

    SAVE_GCODE_STATE NAME=buffer_post_unload_clean_state

    RESPOND MSG="Buffer: Starting synchronized retraction (buffer motor + extruder)..."
    SET_PIN PIN=_Feed_Button VALUE=1
    SET_PIN PIN=_Retract_Button VALUE=0

    M83
    G92 E0
    G1 E-{hotend_path_length} F{speed}
    M400

    RESPOND MSG="Buffer: Extruder cleared - buffer continuing until filament ejected..."
    Buffer_Retract_Until_Runout TIMEOUT=60 POLL=0.5

    RESTORE_GCODE_STATE NAME=buffer_post_unload_clean_state
